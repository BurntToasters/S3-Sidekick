name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Guard release branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must be run from refs/heads/main (current: ${GITHUB_REF})." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci
      - run: npm run test:all
      - run: npm run build

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            label: win-x64
            experimental: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            label: win-arm64
            experimental: false
          - os: macos-latest
            target: universal-apple-darwin
            bundles: dmg,app
            label: mac-universal
            experimental: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            label: linux-x64
            experimental: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            label: linux-arm64
            experimental: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install ARM64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - run: npm ci
      - run: npm run sync-version
      - run: npm run licenses

      - name: Build
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create macOS zip
        if: runner.os == 'macOS'
        run: node scripts/zip-macos.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.exe.sig
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.msi.sig
            src-tauri/target/**/bundle/**/*.nsis.zip
            src-tauri/target/**/bundle/**/*.nsis.zip.sig
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.dmg.sig
            src-tauri/target/**/bundle/**/*.zip
            src-tauri/target/**/bundle/**/*.zip.sig
            src-tauri/target/**/bundle/**/*.app.tar.gz
            src-tauri/target/**/bundle/**/*.app.tar.gz.sig
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.AppImage.sig
            src-tauri/target/**/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.deb.sig
            src-tauri/target/**/bundle/**/*.rpm
            src-tauri/target/**/bundle/**/*.rpm.sig

  flatpak:
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.gnome.Platform//48 \
            org.gnome.Sdk//48 \
            org.freedesktop.Sdk.Extension.node22//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - run: npm ci
      - run: npm run sync-version
      - run: npm run flatpak:clean
      - run: npm run flatpak:bundle

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-flatpak-x64
          path: dist/*.flatpak

  sign-and-publish:
    needs: [build, flatpak]
    runs-on: ubuntu-22.04
    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten artifacts into release/
        run: |
          mkdir -p release
          while IFS= read -r file; do
            base="$(basename "$file")"
            if [ -e "release/$base" ]; then
              echo "Duplicate artifact basename detected: $base" >&2
              exit 1
            fi
            cp "$file" "release/$base"
          done < <(find release-artifacts -type f \( \
            -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.deb' \
            -o -name '*.rpm' -o -name '*.flatpak' -o -name '*.zip' \
            -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.sig' \
          \) | sort)
          ls -lh release/

      - name: Import GPG key
        if: env.HAS_GPG_KEY == 'true'
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign and upload
        run: node scripts/gpg-sign.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
