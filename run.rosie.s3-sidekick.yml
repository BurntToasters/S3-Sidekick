app-id: run.rosie.s3-sidekick
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
command: s3-sidekick
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --env=GDK_BACKEND=x11
  - --share=network
  - --device=dri
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-desktop:rw

modules:
  - name: s3-sidekick
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      append-path: /run/build/s3-sidekick/cargo/bin:/usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/s3-sidekick/cargo
        RUSTUP_HOME: /run/build/s3-sidekick/rustup
        npm_config_cache: /run/build/s3-sidekick/npm-cache
        HUSKY: '0'
    build-commands:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
      - npm ci
      - npm run sync-version
      - npm run licenses
      - npm run build
      - unset CFLAGS CXXFLAGS CFLAGS_x86_64_unknown_linux_gnu && npx tauri build --no-bundle
      - install -Dm755 src-tauri/target/release/s3-sidekick /app/bin/s3-sidekick
      - install -Dm644 run.rosie.s3-sidekick.desktop /app/share/applications/run.rosie.s3-sidekick.desktop
      - install -Dm644 run.rosie.s3-sidekick.metainfo.xml /app/share/metainfo/run.rosie.s3-sidekick.metainfo.xml
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/run.rosie.s3-sidekick.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/run.rosie.s3-sidekick.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/run.rosie.s3-sidekick.png
    sources:
      - type: dir
        path: .
        skip:
          - .git
          - .github
          - node_modules
          - release
          - release-artifacts
          - dist
          - src-tauri/target
          - target
          - "*.log"
